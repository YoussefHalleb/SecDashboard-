name: URL Scan and Send to DefectDojo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout le code
      - name: Checkout repository
        uses: actions/checkout@v2

      # 2. Installer Docker pour exécuter OWASP ZAP
      - name: Set up Docker
        uses: docker/setup-buildx-action@v1

      # 3. Télécharger et exécuter le conteneur OWASP ZAP pour scanner l'URL
      - name: Run OWASP ZAP scan
        run: |
          docker pull owasp/zap2docker-stable
          docker run -t owasp/zap2docker-stable zap-baseline.py -t http://wackopicko.com -r zap_report.html

      # 4. Télécharger les résultats du scan (générés en HTML)
      - name: Upload OWASP ZAP report
        uses: actions/upload-artifact@v3
        with:
          name: zap-report
          path: zap_report.html

      # 5. Installer les dépendances pour envoyer les résultats à DefectDojo
      - name: Install dependencies
        run: |
          pip install requests

      # 6. Envoyer les résultats à DefectDojo via API
      - name: Upload results to DefectDojo
        run: |
          python3 - <<EOF
          import requests
          import json

          DEFECTDOJO_URL = "${{ secrets.DEFECTDOJO_URL }}"
          DEFECTDOJO_API_KEY = "${{ secrets.DEFECTDOJO_API_KEY }}"
          
          # Charger le fichier de rapport
          with open("zap_report.html", "r") as file:
              zap_report = file.read()

          # Créer un produit dans DefectDojo (nom du produit : "WackoPicko")
          product_data = {
              "name": "WackoPicko",
              "description": "Security scan results for WackoPicko",
          }

          # Ajouter le produit à DefectDojo si nécessaire
          product_url = f"{DEFECTDOJO_URL}/api/v2/products/"
          headers = {
              "Authorization": f"Token {DEFECTDOJO_API_KEY}",
              "Content-Type": "application/json",
          }

          # Envoi de la requête pour créer un produit
          product_response = requests.post(product_url, headers=headers, json=product_data)
          if product_response.status_code != 201:
              print(f"Failed to create product: {product_response.status_code} - {product_response.text}")
              exit(1)
          
          product = product_response.json()
          product_id = product['id']

          # Créer une vulnérabilité dans DefectDojo en utilisant le scan ZAP
          finding_data = {
              "scan_type": "ZAP Scan",
              "file": zap_report,  # Le rapport ZAP en HTML
              "engagement": 1,  # ID d'engagement à définir selon votre projet DefectDojo
              "tags": ["Zap Scan"],
              "product": product_id,  # ID du produit WackoPicko
          }

          # API pour envoyer les résultats du scan
          scan_url = f"{DEFECTDOJO_URL}/api/v2/import-scan/"
          scan_response = requests.post(scan_url, headers=headers, json=finding_data)

          if scan_response.status_code == 201:
              print("Scan results successfully uploaded to DefectDojo!")
          else:
              print(f"Failed to upload scan results: {scan_response.status_code} - {scan_response.text}")
          EOF
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
