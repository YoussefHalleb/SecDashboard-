name: URL Scan and Send to DefectDojo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Docker Network
        run: docker network create zap-net || true

      - name: OWASP ZAP Full Scan
        run: |
          docker run --rm \
            --user root \
            --network zap-net \
            -v "$(pwd)":/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://wackopicko.com \
            -x zap.xml \
            -r zap.html \
            -j \
            -z "-config spider.maxDuration=5 \
              -config ajaxSpider.maxDuration=5 \
              -config scanner.attackStrength=MEDIUM \
              -config scanner.maxScanDurationInMins=10" || true

      - name: Check ZAP reports
        run: |
          ls -la
          if [ ! -f zap.xml ]; then
            echo "zap.xml not found"
            exit 1
          fi
          if [ ! -f zap.html ]; then
            echo "zap.html not found"
            exit 1
          fi

      - name: Upload ZAP reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            zap.xml
            zap.html

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Upload ZAP results to DefectDojo
        run: |
          python3 - <<'EOF'
          import os
          import requests
          from datetime import date

          DEFECTDOJO_URL = os.environ["DEFECTDOJO_URL"].rstrip("/")
          DEFECTDOJO_API_KEY = os.environ["DEFECTDOJO_API_KEY"]

          headers = {
              "Authorization": f"Token {DEFECTDOJO_API_KEY}",
          }

          data = {
              "scan_type": "ZAP Scan",
              "product_name": "WackoPicko",
              "engagement_name": "WackoPicko ZAP Scan",
              "auto_create_context": "true",
              "active": "true",
              "verified": "false",
              "scan_date": str(date.today()),
              "minimum_severity": "Info",
          }

          with open("zap.xml", "rb") as f:
              files = {"file": f}

              response = requests.post(
                  f"{DEFECTDOJO_URL}/api/v2/import-scan/",
                  headers=headers,
                  data=data,
                  files=files,
                  timeout=60
              )

          print(response.status_code)
          print(response.text)

          if response.status_code not in [200, 201]:
              exit(1)
          EOF
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
